  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    :root {
      --bg: #06080f;
      --bg2: #0c111f;
      --card-bg: #141928;
      --text: #e5e5e5;
      --muted: #7a8899;
      --cyan: #00e5ff;
      --purple: #7c3aed;
      --pink: #d946ef;
      --gold: #f5a623;
      --border: rgba(255,255,255,0.08);
      --nav-h: 68px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
    body { overflow-x: hidden; overflow-y: auto; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 52px;
      background: linear-gradient(to bottom, rgba(6,8,15,0.97) 0%, rgba(6,8,15,0) 100%);
      transition: background 0.4s;
    }
    nav.solid { background: rgba(6,8,15,0.97); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .nav-left { display: flex; align-items: center; gap: 36px; }
    .nav-logo { font-size: 22px; font-weight: 900; letter-spacing: -0.04em; background: linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: rgba(229,229,229,0.65); font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 18px; }
    .nav-icon-btn { background: none; border: none; color: rgba(229,229,229,0.6); font-size: 20px; cursor: pointer; transition: color 0.2s; line-height: 1; padding: 4px; }
    .nav-icon-btn:hover { color: #fff; }
    .nav-avatar { width: 32px; height: 32px; border-radius: 6px; background: linear-gradient(135deg,var(--cyan),var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #000; cursor: pointer; }

    /* ── HERO ── */
    .hero { position: relative; width: 100%; height: 92vh; min-height: 520px; overflow: hidden; }
    #hero-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .hero-grad {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(6,8,15,0.96) 0%, rgba(6,8,15,0.75) 38%, rgba(6,8,15,0.25) 65%, transparent 100%),
                  linear-gradient(to top, rgba(6,8,15,1) 0%, rgba(6,8,15,0.5) 18%, transparent 45%);
    }
    .hero-content {
      position: absolute; bottom: 120px; left: 60px; max-width: 560px;
      transition: opacity 0.6s;
    }
    .hero-content.fading { opacity: 0; }
    .hero-eyebrow { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent, var(--cyan)); margin-bottom: 18px; }
    .hero-eyebrow::before { content: ''; display: block; width: 28px; height: 2px; background: var(--accent, var(--cyan)); flex-shrink: 0; }
    .hero-title { font-size: clamp(2rem, 4.5vw, 3.8rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1.02; color: #fff; text-shadow: 0 2px 24px rgba(0,0,0,0.9); margin-bottom: 18px; }
    .hero-desc { font-size: 15px; color: rgba(229,229,229,0.82); line-height: 1.72; max-width: 440px; text-shadow: 0 1px 10px rgba(0,0,0,0.95); margin-bottom: 22px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .hero-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .hero-rating { border: 1px solid rgba(229,229,229,0.4); color: rgba(229,229,229,0.7); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.5px; }
    .hero-year, .hero-runtime { color: rgba(229,229,229,0.6); font-size: 13px; }
    .hero-genre { font-size: 12px; color: rgba(229,229,229,0.65); background: rgba(255,255,255,0.08); padding: 3px 11px; border-radius: 20px; }
    .hero-btns { display: flex; gap: 12px; }
    .btn-play {
      display: flex; align-items: center; gap: 10px;
      background: #fff; color: #000;
      padding: 13px 32px; border-radius: 6px;
      font-size: 16px; font-weight: 700; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.12s;
    }
    .btn-play:hover { background: rgba(255,255,255,0.85); transform: scale(1.02); }
    .btn-info {
      display: flex; align-items: center; gap: 10px;
      background: rgba(109,109,110,0.65); color: #fff;
      padding: 13px 26px; border-radius: 6px;
      font-size: 16px; font-weight: 700; border: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-info:hover { background: rgba(109,109,110,0.5); }
    .hero-dots { position: absolute; bottom: 54px; left: 60px; display: flex; gap: 6px; }
    .hero-dot { width: 22px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; }
    .hero-dot.active { background: #fff; width: 34px; }

    /* ── BROWSE SCROLL ── */
    .browse-scroll { position: relative; z-index: 1; margin-top: -130px; padding-bottom: 80px; }

    /* ── ROW ── */
    .row { padding: 0 52px; margin-bottom: 48px; position: relative; }
    .row-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; cursor: pointer; }
    .row-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .row-see-all { font-size: 13px; color: var(--cyan); opacity: 0; transition: opacity 0.2s; font-weight: 500; }
    .row-header:hover .row-see-all { opacity: 1; }
    .row-wrap { position: relative; }
    .row-arrow {
      position: absolute; top: 0; bottom: 0; width: 64px;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; cursor: pointer; opacity: 0; transition: opacity 0.2s;
      font-size: 32px; color: #fff; font-weight: 300;
      user-select: none;
    }
    .row-arrow.lft { left: 0; background: linear-gradient(to right, rgba(6,8,15,0.92), transparent); }
    .row-arrow.rgt { right: 0; background: linear-gradient(to left, rgba(6,8,15,0.92), transparent); }
    .row-wrap:hover .row-arrow { opacity: 1; }
    .row-track {
      display: flex; gap: 6px;
      overflow-x: auto; overflow-y: visible;
      scroll-snap-type: x mandatory; scroll-behavior: smooth;
      padding: 12px 0 16px;
      cursor: grab;
    }
    .row-track:active { cursor: grabbing; }
    .row-track::-webkit-scrollbar { display: none; }

    /* ── CARD ── */
    .card {
      flex: 0 0 220px; height: 130px;
      border-radius: 6px; overflow: visible;
      cursor: pointer; position: relative;
      scroll-snap-align: start;
      transition: transform 0.28s cubic-bezier(.16,1,.3,1);
    }
    .card:hover { transform: scale(1.09); z-index: 20; }
    .card-thumb {
      width: 220px; height: 130px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; position: relative; overflow: hidden;
    }
    .card-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.15) 50%, transparent 100%);
    }
    .card-label {
      position: absolute; bottom: 8px; left: 10px; right: 10px;
      font-size: 12px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      z-index: 1;
    }
    .card-hover {
      position: absolute; top: 130px; left: -10px; right: -10px;
      background: var(--card-bg); border-radius: 0 0 8px 8px;
      border: 1px solid var(--border); border-top: none;
      padding: 12px; z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s 0.1s;
    }
    .card:hover .card-hover { opacity: 1; pointer-events: all; }
    .card-hover-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .card-hover-sub { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .card-hover-btns { display: flex; gap: 6px; }
    .card-btn-play { flex: 1; background: #fff; color: #000; border: none; border-radius: 4px; font-size: 12px; font-weight: 700; padding: 7px 0; cursor: pointer; transition: background 0.15s; }
    .card-btn-play:hover { background: rgba(255,255,255,0.85); }
    .card-btn-info { flex: 0 0 32px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .card-btn-info:hover { background: rgba(255,255,255,0.2); }
    .card-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.15); border-radius: 0 0 6px 6px; overflow: hidden; }
    .card-progress-fill { height: 100%; border-radius: 2px; }

    /* ── PLAYER ── */
    #player {
      position: fixed; inset: 0; z-index: 500;
      background: #000; display: none; flex-direction: column;
    }
    #player.active { display: flex; }
    #player-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .player-ui { position: absolute; inset: 0; display: flex; flex-direction: column; }

    /* top bar */
    .player-top {
      padding: 28px 44px 60px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, transparent 100%);
      display: flex; align-items: flex-start; gap: 18px;
      transition: opacity 0.4s;
    }
    .player-top.hide { opacity: 0; pointer-events: none; }
    .player-back-btn {
      background: none; border: none; color: rgba(255,255,255,0.8);
      font-size: 15px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: color 0.15s; white-space: nowrap;
    }
    .player-back-btn:hover { color: #fff; }
    .player-titles { flex: 1; }
    .player-prog-title { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .player-scene-name { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 3px; }

    /* bottom controls */
    .player-bottom {
      margin-top: auto;
      padding: 60px 44px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      transition: opacity 0.4s;
    }
    .player-bottom.hide { opacity: 0; pointer-events: none; }

    /* scene chips */
    .scene-chips { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
    .scene-chips::-webkit-scrollbar { display: none; }
    .scene-chip {
      flex: 0 0 auto; font-size: 11px; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.55);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .scene-chip.on { background: var(--paccent,var(--cyan)); color: #000; border-color: transparent; }
    .scene-chip:hover:not(.on) { border-color: rgba(255,255,255,0.5); color: #fff; }

    /* timeline */
    .tl-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .tl-time { font-size: 13px; color: rgba(255,255,255,0.65); font-variant-numeric: tabular-nums; min-width: 38px; }
    .tl-bar-wrap { flex: 1; position: relative; height: 4px; cursor: pointer; }
    .tl-bg { position: absolute; inset: 0; background: rgba(255,255,255,0.2); border-radius: 2px; transition: height 0.15s, top 0.15s; }
    .tl-bar-wrap:hover .tl-bg { height: 6px; top: -1px; }
    .tl-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: var(--paccent,var(--cyan)); border-radius: 2px; pointer-events: none; }
    .tl-thumb { position: absolute; top: 50%; width: 14px; height: 14px; background: #fff; border-radius: 50%; transform: translate(-50%,-50%) scale(0); transition: transform 0.15s; pointer-events: none; left: 0%; }
    .tl-bar-wrap:hover .tl-thumb { transform: translate(-50%,-50%) scale(1); }
    .tl-chapters { position: absolute; inset: 0; pointer-events: none; }
    .tl-ch-dot { position: absolute; top: 50%; width: 3px; height: 3px; background: rgba(255,255,255,0.45); border-radius: 50%; transform: translate(-50%,-50%); }

    /* control row */
    .ctrl-row { display: flex; align-items: center; gap: 16px; }
    .ctrl-btn { background: none; border: none; color: rgba(255,255,255,0.85); cursor: pointer; font-size: 24px; line-height: 1; padding: 4px; transition: color 0.15s, transform 0.12s; }
    .ctrl-btn:hover { color: #fff; transform: scale(1.12); }
    .ctrl-btn.xl { font-size: 34px; }
    .ctrl-sp { flex: 1; }
    .vol-wrap { display: flex; align-items: center; gap: 8px; }
    .vol-slider { width: 76px; height: 4px; accent-color: #fff; cursor: pointer; }
    .scene-badge { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.18); padding: 3px 11px; border-radius: 20px; }

    /* ── INFO MODAL ── */
    #info-modal { position: fixed; inset: 0; z-index: 400; display: none; align-items: flex-end; justify-content: center; }
    #info-modal.active { display: flex; }
    .modal-back { position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
    .modal-sheet {
      position: relative; background: #181820;
      border-radius: 16px 16px 0 0; width: 100%; max-width: 900px; max-height: 90vh;
      overflow-y: auto; animation: slideUp 0.32s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-preview { width: 100%; aspect-ratio: 16/7; position: relative; overflow: hidden; border-radius: 16px 16px 0 0; }
    #modal-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .modal-prev-grad { position: absolute; inset: 0; background: linear-gradient(to top, #181820 0%, rgba(24,24,32,0.3) 55%, transparent 100%); }
    .modal-x { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 50%; background: rgba(20,20,28,0.8); border: none; color: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.15s; }
    .modal-x:hover { background: rgba(40,40,55,0.95); }
    .modal-body { padding: 0 36px 48px; margin-top: -52px; position: relative; }
    .modal-acts { display: flex; gap: 12px; margin-bottom: 20px; }
    .modal-title-h { font-size: 30px; font-weight: 900; letter-spacing: -0.04em; color: #fff; margin-bottom: 6px; }
    .modal-tagline { font-size: 14px; font-style: italic; color: var(--muted); margin-bottom: 16px; }
    .modal-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
    .meta-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); color: rgba(229,229,229,0.65); }
    .meta-tag { font-size: 12px; color: rgba(229,229,229,0.6); background: rgba(255,255,255,0.07); padding: 3px 10px; border-radius: 20px; }
    .modal-desc-p { font-size: 14px; color: rgba(229,229,229,0.82); line-height: 1.72; margin-bottom: 28px; }
    .modal-scenes-h { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px; }
    .modal-scene-row { display: flex; align-items: center; gap: 16px; padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: color 0.2s; }
    .modal-scene-row:hover { color: var(--accent,var(--cyan)); }
    .msr-num { font-size: 22px; font-weight: 300; color: var(--muted); min-width: 32px; }
    .msr-title { flex: 1; font-size: 15px; font-weight: 600; }
    .msr-dur { font-size: 13px; color: var(--muted); }
    .msr-play { font-size: 18px; opacity: 0; transition: opacity 0.2s; }
    .modal-scene-row:hover .msr-play { opacity: 1; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 30px; left: 50%; z-index: 600;
      transform: translateX(-50%) translateY(16px);
      background: rgba(255,255,255,0.12); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 8px;
      padding: 12px 24px; font-size: 14px; color: #fff;
      opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
    }
    #toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── ANIMATIONS ── */
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton { background: linear-gradient(90deg, #141928 25%, #1e2540 50%, #141928 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 6px; }


    /* ── SEARCH OVERLAY ── */
    .search-over {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 300;
      background: rgba(6,8,15,0.97); backdrop-filter: blur(28px);
      padding: 88px 52px 40px; overflow-y: auto;
      transform: translateY(-100%); transition: transform 0.36s cubic-bezier(.16,1,.3,1);
      pointer-events: none;
    }
    .search-over.open { transform: none; pointer-events: all; }
    .search-bar-row {
      display: flex; align-items: center; gap: 14px;
      border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 26px;
    }
    .search-bar-row .sb-icon { font-size: 26px; color: var(--muted); flex-shrink: 0; }
    .search-bar-row input {
      flex: 1; background: none; border: none; color: #fff;
      font-size: 22px; font-weight: 300; outline: none; font-family: inherit;
    }
    .search-bar-row input::placeholder { color: rgba(255,255,255,0.18); }
    .search-bar-row .sb-close {
      background: none; border: none; color: var(--muted);
      font-size: 17px; cursor: pointer; padding: 6px 10px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .search-bar-row .sb-close:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .search-label { font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .search-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap: 12px;
    }
    .src-card {
      background: var(--card-bg); border-radius: 10px; overflow: hidden;
      cursor: pointer; border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.15s;
    }
    .src-card:hover { border-color: rgba(255,255,255,0.22); transform: translateY(-2px); }
    .src-accent-bar { height: 3px; }
    .src-thumb-box { height: 68px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    .src-body { padding: 10px 12px 14px; }
    .src-title { font-size: 13px; font-weight: 700; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .src-meta { font-size: 11px; color: var(--muted); }
    .src-no-res { grid-column: 1/-1; text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 15px; }
        /* ═══════════════════════════════════════════════════════════════
       NEXGEN VIDEO INFRASTRUCTURE — Theatre
       PiP · Mini-Player · Speed · Up-Next · Reactions · Share
    ═══════════════════════════════════════════════════════════════ */

    /* Speed Picker */
    .speed-wrap { position: relative; }
    .speed-popup {
      position: absolute; bottom: 48px; right: 0;
      background: rgba(8,10,22,0.97); backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 6px 0; min-width: 108px; z-index: 20;
      transform: scale(0.9) translateY(8px); transform-origin: bottom right;
      opacity: 0; pointer-events: none;
      transition: transform 0.18s cubic-bezier(.16,1,.3,1), opacity 0.18s;
    }
    .speed-popup.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
    .spd-opt { display: block; width: 100%; background: none; border: none;
      color: rgba(255,255,255,0.62); font-size: 13px; font-weight: 500;

    .spd-opt:hover { background: rgba(255,255,255,0.07); color: #fff; }

        vx: (Math.random() - 0.5) * 0.3,

      const loop = () => {
        ctx.fillStyle = 'rgba(0,10,24,0.12)';
        ctx.fillRect(0, 0, W, H);

        nodes.forEach(n => {
          n.x += n.vx; n.y += n.vy;

          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];

            const dist = Math.sqrt(dx*dx + dy*dy);

  // 8. MERKABA — counter-rotating tetrahedra + PHI spiral
  merkaba: {
    _raf: null,
    start(canvas, si) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;
      const sceneScales = [0.5, 0.65, 0.8, 0.95, 1.1];
      const scale = sceneScales[si] || 0.7;
      let t = 0;

      function projectTet(verts, angle, flip) {
        return verts.map(([x, y, z]) => {
          const a = flip ? -angle : angle;
          const rx = x * Math.cos(a) - z * Math.sin(a);
          const rz = x * Math.sin(a) + z * Math.cos(a);
          const ry = y;
          const persp = 3 / (3 + rz * 0.4);
          return [cx + rx * persp * scale * Math.min(W, H) * 0.35,
                  cy + ry * persp * scale * Math.min(W, H) * 0.35];
        });
      }

      const TET_V = [
        [0, 1, 0], [-0.87, -0.5, 0], [0.87, -0.5, 0], [0, 0, 1.2]
      ];
      const TET_E = [[0,1],[1,2],[2,0],[0,3],[1,3],[2,3]];

      const loop = () => {
        ctx.fillStyle = 'rgba(6,5,2,0.08)';
        ctx.fillRect(0, 0, W, H);

        [false, true].forEach(flip => {
          const pts = projectTet(TET_V, t * (flip ? -1 : 1), false);
          const color = flip ? '#00e5ff' : '#f5a623';
          TET_E.forEach(([a, b]) => {
            ctx.strokeStyle = color + 'aa';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(pts[a][0], pts[a][1]);
            ctx.lineTo(pts[b][0], pts[b][1]);
            ctx.stroke();
          });
          pts.forEach(([px, py]) => {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fill();
          });
        });

        // PHI spiral overlay
        ctx.strokeStyle = 'rgba(245,166,35,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < 360; i++) {
          const a = (i / 180) * Math.PI + t * 0.2;
          const r = Math.pow(PHI, i / 90) * 3;
          const px = cx + Math.cos(a) * r;
          const py = cy + Math.sin(a) * r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();

        // D48 node ring
        for (let n = 0; n < 48; n++) {
          const angle = (n / 48) * Math.PI * 2 + t * 0.1;
          const r2 = Math.min(W, H) * 0.42 * scale;
          const px = cx + Math.cos(angle) * r2;
          const py = cy + Math.sin(angle) * r2;
          const active = n % 8 === Math.floor(t * 2) % 8;
          ctx.fillStyle = active ? 'rgba(245,166,35,0.9)' : 'rgba(245,166,35,0.2)';
          ctx.beginPath(); ctx.arc(px, py, active ? 4 : 2, 0, Math.PI * 2); ctx.fill();
        }

        t += 0.012;
        this._raf = requestAnimationFrame(loop);
      };
      loop();
    },
    stop() { cancelAnimationFrame(this._raf); }
  },

  // 9. PHOENIX — fire particle system
  phoenix: {
    _raf: null,
    start(canvas, si) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const sceneHeat = [0.4, 0.65, 1.0, 1.4, 1.1];
      const heat = sceneHeat[si] || 1;
      const particles = [];
      const emit = () => {
        const spread = 40 + heat * 30;
        particles.push({
          x: W/2 + (Math.random()-0.5)*spread,
          y: H * 0.82,
          vx: (Math.random()-0.5) * 1.8 * heat,
          vy: -(Math.random()*3 + 2) * heat,
          life: 1, decay: 0.008 + Math.random()*0.006,
          size: Math.random()*6+2
        });
      };

      const loop = () => {
        ctx.fillStyle = `rgba(8,2,0,0.15)`;
        ctx.fillRect(0, 0, W, H);

        // emit particles
        for (let e = 0; e < Math.floor(6 * heat); e++) emit();
        if (particles.length > 1800) particles.splice(0, 200);

        // base glow
        const bg = ctx.createRadialGradient(W/2, H*0.82, 0, W/2, H*0.82, 80*heat);
        bg.addColorStop(0, `rgba(255,200,50,${0.4*heat})`);
        bg.addColorStop(0.5, `rgba(255,80,10,${0.2*heat})`);
        bg.addColorStop(1, 'transparent');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        particles.forEach((p, i) => {
          p.x += p.vx + Math.sin(p.life * 8) * 0.4;
          p.y += p.vy;
          p.vy *= 0.99;
          p.life -= p.decay;
          if (p.life <= 0) { particles.splice(i, 1); return; }
          const lf = p.life;
          const r = lf > 0.6 ? 255 : Math.floor(255 * lf / 0.6);
          const g = lf > 0.4 ? Math.floor(160 * lf) : 0;
          const b = 0;
          ctx.fillStyle = `rgba(${r},${g},${b},${lf * 0.8})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * lf, 0, Math.PI * 2);
          ctx.fill();
        });

        this._raf = requestAnimationFrame(loop);
      };
      loop();
    },
    stop() { cancelAnimationFrame(this._raf); }
  },

  // 10. OCEAN — bioluminescent deep sea
  ocean: {
    _raf: null,
    start(canvas, si) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const particles = Array.from({length: 280}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*3+1,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.2,
        phase: Math.random()*Math.PI*2,
        color: Math.random() < 0.5 ? [0,229,255] : [0,200,180]
      }));
      const jellyfish = Array.from({length: 4}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        size: 40+Math.random()*60,
        phase: Math.random()*Math.PI*2,
        speed: 0.005+Math.random()*0.005
      }));
      const sceneBright = [0.08, 0.14, 0.20, 0.28, 0.16];
      const bright = sceneBright[si] || 0.15;
      let t = 0;

      const loop = () => {
        ctx.fillStyle = `rgba(0,${8+si*3},${18+si*5},0.12)`;
        ctx.fillRect(0, 0, W, H);

        // light rays from above
        for (let r = 0; r < 5; r++) {
          const rx = W * (0.1 + r * 0.2) + Math.sin(t * 0.3 + r) * 20;
          ctx.strokeStyle = `rgba(0,180,220,0.03)`;
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(rx, 0); ctx.lineTo(rx + 30, H);
          ctx.stroke();
        }

        // particles
        particles.forEach(p => {
          p.x += p.vx + Math.sin(t * 0.5 + p.phase) * 0.2;
          p.y += p.vy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          p.phase += 0.02;
          const alpha = bright * (0.5 + 0.5 * Math.sin(p.phase));
          ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha})`;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
          // trail
          ctx.strokeStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${alpha*0.3})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.vx*8, p.y - p.vy*8); ctx.stroke();
        });

        // jellyfish outlines
        jellyfish.forEach(j => {
          j.phase += j.speed;
          const pulse = 0.85 + 0.15 * Math.sin(j.phase * 4);
          j.y -= 0.12;
          if (j.y < -j.size) j.y = H + j.size;
          const alpha = bright * 0.8;
          ctx.strokeStyle = `rgba(0,229,255,${alpha})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(j.x, j.y, j.size * pulse, Math.PI, Math.PI * 2);
          ctx.stroke();
          // tentacles
          for (let ten = 0; ten < 6; ten++) {
            const tx = j.x - j.size*0.8 + ten * (j.size*1.6/5);
            ctx.strokeStyle = `rgba(0,200,180,${alpha*0.5})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(tx, j.y);
            ctx.bezierCurveTo(tx + Math.sin(t+ten)*15, j.y+j.size*0.6, tx, j.y+j.size, tx + Math.sin(t*0.7+ten)*10, j.y+j.size*1.4);
            ctx.stroke();
          }
        });

        t += 0.016;
        this._raf = requestAnimationFrame(loop);
      };
      loop();
    },
    stop() { cancelAnimationFrame(this._raf); }
  },

  // 11. ESCHER — rotating wireframe impossible geometry
  escher: {
    _raf: null,
    start(canvas, si) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W/2, cy = H/2;
      const speedMult = [0.003, 0.005, 0.007, 0.005, 0.002];
      const spd = speedMult[si] || 0.004;
      let t = 0;

      function drawRecursive(x, y, size, depth, angle) {
        if (depth <= 0 || size < 6) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        const alpha = 0.15 + (depth / 5) * 0.5;
        ctx.strokeStyle = `rgba(148,163,184,${alpha})`;
        ctx.lineWidth = depth * 0.4;
        ctx.strokeRect(-size/2, -size/2, size, size);
        // impossible corner accents
        const cornerColors = ['rgba(0,229,255,', 'rgba(124,58,237,'];
        ctx.strokeStyle = cornerColors[depth % 2] + `${alpha * 1.5})`;
        ctx.lineWidth = 0.8;
        const h = size/2;
        const sh = size * 0.12;
        [[−h,−h],[h,−h],[h,h],[−h,h]].forEach(([cx2,cy2]) => {
          ctx.beginPath();
          ctx.moveTo(cx2 + (cx2>0?-sh:sh), cy2);
          ctx.lineTo(cx2, cy2);
          ctx.lineTo(cx2, cy2 + (cy2>0?-sh:sh));
          ctx.stroke();
        });
        drawRecursive(-size*0.3, -size*0.3, size*0.5, depth-1, angle + Math.PI/4);
        drawRecursive( size*0.3,  size*0.3, size*0.5, depth-1, angle - Math.PI/4);
        ctx.restore();
      }

      const loop = () => {
        ctx.fillStyle = 'rgba(8,8,18,0.1)';
        ctx.fillRect(0, 0, W, H);
        drawRecursive(cx, cy, Math.min(W,H)*0.65, 5, t);
        // staircase lines
        const steps = 12;
        ctx.strokeStyle = 'rgba(148,163,184,0.08)';
        ctx.lineWidth = 1;
        for (let s = 0; s < steps; s++) {
          const angle = (s / steps) * Math.PI * 2 + t * 0.5;
          const r1 = Math.min(W,H) * 0.15;
          const r2 = Math.min(W,H) * 0.45;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(angle)*r1, cy + Math.sin(angle)*r1);
          ctx.lineTo(cx + Math.cos(angle+0.26)*r2, cy + Math.sin(angle+0.26)*r2);
          ctx.stroke();
        }
        t += spd;
        this._raf = requestAnimationFrame(loop);
      };
      loop();
    },
    stop() { cancelAnimationFrame(this._raf); }
  },

  // 12. CHRONOS — Fibonacci clock spiral with time dilation
  chronos: {
    _raf: null,
    start(canvas, si) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W/2, cy = H/2;
      const sceneSpeeds = [0.4, 0.8, 1.5, 4, 0.15];
      const masterSpeed = sceneSpeeds[si] || 1;
      const arms = 8;
      const trails = Array.from({length: arms}, (_, i) => ({
        positions: [],
        baseAngle: (i / arms) * Math.PI * 2,
        armLen: 60 + i * 20,
        localSpeed: masterSpeed / (1 + i * 0.5) // dilation — outer arms slower
      }));
      let t = 0;

      const loop = () => {
        ctx.fillStyle = 'rgba(10,8,2,0.08)';
        ctx.fillRect(0, 0, W, H);

        // Fibonacci spiral guide
        ctx.strokeStyle = 'rgba(251,191,36,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < 500; i++) {
          const a = (i / 180) * Math.PI;
          const r = Math.pow(PHI, i / 90) * 1.8;
          const px = cx + Math.cos(a + t * 0.05) * r;
          const py = cy + Math.sin(a + t * 0.05) * r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();

        arms && trails.forEach((arm, ai) => {
          const angle = arm.baseAngle + t * arm.localSpeed;
          const r = arm.armLen * (0.8 + 0.2 * Math.sin(t * 0.3 + ai));
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          arm.positions.push({x, y});
          if (arm.positions.length > 40) arm.positions.shift();

          // draw trail
          arm.positions.forEach((pos, pi) => {
            const alpha = (pi / arm.positions.length) * 0.7;
            const gold = Math.floor(200 + ai * 5);
            ctx.fillStyle = `rgba(${gold},${Math.floor(160 - ai*10)},36,${alpha})`;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 2.5 * (pi/arm.positions.length), 0, Math.PI * 2);
            ctx.fill();
          });

          // clock hand dot
          ctx.fillStyle = '#fbbf24';
          ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();

          // spoke to centre
          ctx.strokeStyle = `rgba(251,191,36,0.12)`;
          ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
        });

        // centre nexus
        const ng = ctx.createRadialGradient(cx, cy, 0, cx, cy, 24);
        ng.addColorStop(0, 'rgba(251,191,36,0.8)');
        ng.addColorStop(1, 'transparent');
        ctx.fillStyle = ng;
        ctx.beginPath(); ctx.arc(cx, cy, 24, 0, Math.PI * 2); ctx.fill();

        t += 0.016 * masterSpeed;
        this._raf = requestAnimationFrame(loop);
      };
      loop();
    },
    stop() { cancelAnimationFrame(this._raf); }
  }
};

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let currentProg = null;      // programme object
let currentScene = 0;        // scene index
let playerPlaying = false;
let playerTimer = null;
let playerElapsed = 0;       // seconds elapsed in current scene
let uiHideTimer = null;
let heroIndex = 0;
let heroTimer = null;
let heroRenderer = null;
let modalRenderer = null;
let modalProg = null;
let myList = JSON.parse(localStorage.getItem('aios_mylist') || '[]');
const progress = JSON.parse(localStorage.getItem('aios_progress') || '{}');

function saveProgress() {
  if (!currentProg) return;
  const key = currentProg.id;
  progress[key] = { scene: currentScene, elapsed: playerElapsed, ts: Date.now() };
  localStorage.setItem('aios_progress', JSON.stringify(progress));
}

// ─────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────
function fmtTime(secs) {
  const s = Math.floor(secs), m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}
function fmtRuntime(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function getRenderer(id) {
  return RENDERERS[id] || null;
}
function sizeCanvas(canvas) {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
function toast(msg, dur = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), dur);
}
function scrollToRow(rowId, e) {
  if (e) e.preventDefault();
  const el = document.getElementById('row-' + rowId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function scrollRow(trackId, dir) {
  const track = document.getElementById(trackId);
  if (!track) return;
  track.scrollBy({ left: dir * 680, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────────
// BROWSE — build rows & cards
// ─────────────────────────────────────────────────────────────
function buildCard(prog, showProgress) {
  const p = progress[prog.id];
  const hasProgress = showProgress && p;
  const pct = hasProgress ? ((p.scene * 100 / prog.scenes.length) + (p.elapsed / prog.scenes[p.scene].dur / prog.scenes.length * 100)).toFixed(1) : 0;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-thumb" style="background:${prog.thumb}">
      <canvas class="card-live-cv" id="cv-${prog.id}"></canvas>
      <span style="z-index:1;position:relative;text-shadow:0 2px 8px rgba(0,0,0,0.8)">${prog.icon}</span>
      <div class="card-label">${prog.title}</div>
      ${hasProgress ? `<div class="card-progress"><div class="card-progress-fill" style="width:${pct}%;background:${prog.accent}"></div></div>` : ''}
    </div>
    <div class="card-hover">
      <div class="card-hover-title">${prog.title}</div>
      <div class="card-hover-sub">${prog.year} · ${fmtRuntime(prog.runtime)} · ${prog.genre[0]}</div>
      ${hasProgress ? `<div style="font-size:10px;color:var(--muted);margin-bottom:6px">▶ Resume Scene ${(p.scene+1)}</div>` : ''}
      <div class="card-hover-btns">
        <button class="card-btn-play" onclick="openPlayer('${prog.id}',${hasProgress ? p.scene : 0},event)">▶ Play</button>
        <button class="card-btn-info" onclick="openInfo('${prog.id}',event)" title="More Info">ⓘ</button>
      </div>
    </div>`;
  card.addEventListener('click', () => openPlayer(prog.id, hasProgress ? p.scene : 0));
  card.addEventListener('mouseenter', () => _startCardPreview(prog.id));
  card.addEventListener('mouseleave', () => _stopCardPreview(prog.id));
  return card;
}

function buildRows() {
  const container = document.getElementById('rows-container');
  container.innerHTML = '';
  ROWS.forEach(row => {
    const progs = CATALOGUE.filter(row.filter);
    if (!progs.length) return;
    const trackId = `track-${row.id}`;
    const div = document.createElement('div');
    div.className = 'row';
    div.id = `row-${row.id}`;
    div.innerHTML = `
      <div class="row-header">
        <span class="row-title">${row.title}</span>
        <span class="row-see-all">See all →</span>
      </div>
      <div class="row-wrap">
        <div class="row-arrow lft" onclick="scrollRow('${trackId}',-1)">‹</div>
        <div class="row-track" id="${trackId}"></div>
        <div class="row-arrow rgt" onclick="scrollRow('${trackId}',1)">›</div>
      </div>`;
    container.appendChild(div);
    const track = div.querySelector('.row-track');
    progs.forEach(prog => track.appendChild(buildCard(prog, true)));
  });
}

function buildContinueWatching() {
  const entries = Object.entries(progress)
    .filter(([, v]) => Date.now() - v.ts < 30 * 24 * 3600 * 1000)
    .sort(([, a], [, b]) => b.ts - a.ts)
    .slice(0, 8);
  const rowEl = document.getElementById('row-continue');
  const track = document.getElementById('track-continue');
  track.innerHTML = '';
  if (!entries.length) { rowEl.style.display = 'none'; return; }
  rowEl.style.display = '';
  entries.forEach(([id]) => {
    const prog = CATALOGUE.find(p => p.id === id);
    if (prog) track.appendChild(buildCard(prog, true));
  });
}

// ─────────────────────────────────────────────────────────────
// HERO ROTATION
// ─────────────────────────────────────────────────────────────
const FEATURED = CATALOGUE.filter(p => p.featured);

function initHero() {
  const canvas = document.getElementById('hero-canvas');
  sizeCanvas(canvas);
  const dots = document.getElementById('hero-dots');
  dots.innerHTML = FEATURED.map((_, i) => `<div class="hero-dot${i===0?' active':''}" onclick="setHero(${i})"></div>`).join('');
  setHero(0);
  heroTimer = setInterval(() => setHero((heroIndex + 1) % FEATURED.length), 10000);
}

function setHero(idx) {
  heroIndex = idx;
  const prog = FEATURED[idx];
  const content = document.getElementById('hero-content');
  content.classList.add('fading');
  setTimeout(() => {
    document.getElementById('hero-eyebrow').textContent = prog.genre[0] + ' · ' + prog.year;
    document.getElementById('hero-eyebrow').style.color = prog.accent;
    document.getElementById('hero-eyebrow').style.setProperty('--accent', prog.accent);
    document.getElementById('hero-title').textContent = prog.title;
    document.getElementById('hero-desc').textContent = prog.desc;
    const meta = document.getElementById('hero-meta');
    meta.innerHTML = `<span class="hero-rating">${prog.rating}</span><span class="hero-year">${prog.year}</span><span class="hero-runtime">${fmtRuntime(prog.runtime)}</span>${prog.genre.map(g => `<span class="hero-genre">${g}</span>`).join('')}`;
    document.getElementById('hero-play').onclick = () => openPlayer(prog.id, 0);
    document.getElementById('hero-info').onclick = () => openInfo(prog.id);
    document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    content.classList.remove('fading');
  }, 350);

  // swap hero renderer
  if (heroRenderer) { try { heroRenderer.stop(); } catch(_){} }
  const canvas = document.getElementById('hero-canvas');
  sizeCanvas(canvas);
  const renderer = getRenderer(prog.id);
  if (renderer) {
    heroRenderer = renderer;
    renderer.start(canvas, 0);
  }
}

// ─────────────────────────────────────────────────────────────
// PLAYER
// ─────────────────────────────────────────────────────────────
function openPlayer(progId, startScene = 0, e) {
  if (e) e.stopPropagation();
  const prog = CATALOGUE.find(p => p.id === progId);
  if (!prog) return;

  // stop hero renderer
  if (heroRenderer) { try { heroRenderer.stop(); } catch(_){} heroRenderer = null; }
  if (heroTimer) { clearInterval(heroTimer); heroTimer = null; }

  currentProg = prog;
  currentScene = Math.min(startScene, prog.scenes.length - 1);
  playerElapsed = (progress[prog.id] && progress[prog.id].scene === startScene)
    ? (progress[prog.id].elapsed || 0) : 0;

  document.getElementById('player').classList.add('active');
  document.body.style.overflow = 'hidden';
  document.getElementById('player-prog-title').textContent = prog.title;
  document.style && (document.getElementById('player').style.setProperty('--paccent', prog.accent));
  document.getElementById('player').style.setProperty('--paccent', prog.accent);

  const canvas = document.getElementById('player-canvas');
  sizeCanvas(canvas);

  buildSceneChips(prog);
  buildChapterMarkers(prog);
  updateSceneUI();
  startRenderer();
  startAmbientAudio(prog.id);
  startPlayback();
  showPlayerUI();
}

function buildSceneChips(prog) {
  const el = document.getElementById('scene-chips');
  el.innerHTML = prog.scenes.map((s, i) =>
    `<div class="scene-chip${i===currentScene?' on':''}" data-scene="${i}" onclick="jumpToScene(${i})">${i+1}. ${s.title}</div>`
  ).join('');
}

function buildChapterMarkers(prog) {
  const el = document.getElementById('tl-chapters');
  el.innerHTML = '';
  const total = prog.scenes.reduce((a, s) => a + s.dur, 0);
  let acc = 0;
  prog.scenes.forEach((s, i) => {
    if (i === 0) { acc += s.dur; return; }
    const pct = (acc / total * 100).toFixed(2);
    const dot = document.createElement('div');
    dot.className = 'tl-ch-dot';
    dot.style.left = `${pct}%`;
    el.appendChild(dot);
    acc += s.dur;
  });
}

function updateSceneUI() {
  if (!currentProg) return;
  const scene = currentProg.scenes[currentScene];
  document.getElementById('player-scene-name').textContent = `Scene ${currentScene+1} — ${scene.title}`;
  document.getElementById('ctrl-badge').textContent = `Scene ${currentScene+1} / ${currentProg.scenes.length}`;
  document.querySelectorAll('.scene-chip').forEach((c, i) => c.classList.toggle('on', i === currentScene));
  updateTimeline();
}

function updateTimeline() {
  if (!currentProg) return;
  const prog = currentProg;
  const total = prog.scenes.reduce((a, s) => a + s.dur, 0);
  let sceneStart = 0;
  for (let i = 0; i < currentScene; i++) sceneStart += prog.scenes[i].dur;
  const globalElapsed = sceneStart + playerElapsed;
  const pct = Math.min(100, (globalElapsed / total) * 100);
  document.getElementById('tl-fill').style.width = `${pct}%`;
  document.getElementById('tl-thumb').style.left = `${pct}%`;
  document.getElementById('tl-cur').textContent = fmtTime(globalElapsed);
  document.getElementById('tl-tot').textContent = fmtTime(total);
}

function startRenderer() {
  // stop any existing player renderer
  if (window._activePlayerRenderer) {
    try { window._activePlayerRenderer.stop(); } catch(_) {}
    window._activePlayerRenderer = null;
  }
  if (!currentProg) return;
  const renderer = getRenderer(currentProg.id);
  if (!renderer) return;
  const canvas = document.getElementById('player-canvas');
  renderer.start(canvas, currentScene);
  window._activePlayerRenderer = renderer;
}

function startPlayback() {
  playerPlaying = true;
  document.getElementById('ctrl-play').textContent = '⏸';
  const mt = document.getElementById('mini-toggle');
  if (mt) mt.textContent = '⏸';
  if (playerTimer) clearInterval(playerTimer);
  playerTimer = setInterval(() => {
    if (!playerPlaying || !currentProg) return;
    playerElapsed += 0.25 * (window._AIOS_SPD || 1);
    const sceneDur = currentProg.scenes[currentScene].dur;
    // Trigger "Up Next" 10 s before scene end (once per scene)
    const rem = sceneDur - playerElapsed;
    if (rem <= 10 && rem > 9.74 && currentScene < currentProg.scenes.length - 1) {
      _showUpNext(currentScene + 1);
    }
    if (playerElapsed >= sceneDur) {
      _dismissUpNext();
      if (currentScene < currentProg.scenes.length - 1) {
        jumpToScene(currentScene + 1);
      } else {
        // End of programme
        pausePlayback();
        saveProgress();
        toast('Programme complete! Starting over…');
        setTimeout(() => jumpToScene(0), 1800);
      }
      return;
    }
    saveProgress();
    updateTimeline();
  }, 250);
}

function pausePlayback() {
  playerPlaying = false;
  document.getElementById('ctrl-play').textContent = '▶';
  const mt = document.getElementById('mini-toggle');
  if (mt) mt.textContent = '▶';
  if (playerTimer) { clearInterval(playerTimer); playerTimer = null; }
}

function togglePlay() {
  if (playerPlaying) pausePlayback();
  else startPlayback();
}

function jumpToScene(sceneIdx) {
  if (!currentProg) return;
  sceneIdx = Math.max(0, Math.min(currentProg.scenes.length - 1, sceneIdx));
  const wasPlaying = playerPlaying;
  if (playerTimer) { clearInterval(playerTimer); playerTimer = null; }
  currentScene = sceneIdx;
  playerElapsed = 0;
  startRenderer();
  buildSceneChips(currentProg);
  updateSceneUI();
  if (wasPlaying) startPlayback();
}

function closePlayer() {
  saveProgress();
  stopAmbientAudio();
  pausePlayback();
  if (window._activePlayerRenderer) {
    try { window._activePlayerRenderer.stop(); } catch(_) {}
    window._activePlayerRenderer = null;
  }
  document.getElementById('player').classList.remove('active');
  document.body.style.overflow = '';
  currentProg = null;

  // restart hero
  initHero();
  heroTimer = setInterval(() => setHero((heroIndex + 1) % FEATURED.length), 10000);
  buildContinueWatching();
}

// Timeline seek
document.getElementById('tl-bar').addEventListener('click', (e) => {
  if (!currentProg) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const total = currentProg.scenes.reduce((a, s) => a + s.dur, 0);
  const target = pct * total;
  let acc = 0;
  for (let i = 0; i < currentProg.scenes.length; i++) {
    if (acc + currentProg.scenes[i].dur >= target) {
      const wasPlaying = playerPlaying;
      if (playerTimer) { clearInterval(playerTimer); playerTimer = null; }
      currentScene = i;
      playerElapsed = target - acc;
      startRenderer();
      buildSceneChips(currentProg);
      updateSceneUI();
      if (wasPlaying) startPlayback();
      return;
    }
    acc += currentProg.scenes[i].dur;
  }
});

    case 'ArrowRight': e.preventDefault(); { playerElapsed=Math.min(playerElapsed+10,(currentProg?.scenes[currentScene]?.dur||60)-1); updateTimeline(); showPlayerUI(); } break;

    ? CATALOGUE.filter(p =>
        p.title.toLowerCase().includes(q) ||

        p.genre.some(g => g.toLowerCase().includes(q)))

// ═══════════════════════════════════════════════════════════════
// AMBIENT AUDIO ENGINE (WebAudio API — zero external samples, fully generative)
// ═══════════════════════════════════════════════════════════════
var PROG_AUDIO_CFG = {
  matrix:    { hz: 852, wave: 'sawtooth', noise: 0.30, lfo: 0.21, fHz: 1800 },
  inception: { hz: 963, wave: 'sine',     noise: 0.15, lfo: 0.13, fHz: 2200 },
  apollo:    { hz: 417, wave: 'sine',     noise: 0.10, lfo: 0.09, fHz: 1200 },
  hyperspace:{ hz: 528, wave: 'sawtooth', noise: 0.40, lfo: 0.38, fHz: 3000 },
  nebula:    { hz: 396, wave: 'sine',     noise: 0.22, lfo: 0.07, fHz: 900  },
  neural:    { hz: 639, wave: 'square',   noise: 0.20, lfo: 0.28, fHz: 1600 },
  quantum:   { hz: 741, wave: 'sine',     noise: 0.18, lfo: 0.19, fHz: 1500 },
  merkaba:   { hz: 72,  wave: 'sine',     noise: 0.05, lfo: 0.05, fHz: 200  },
  phoenix:   { hz: 528, wave: 'sawtooth', noise: 0.50, lfo: 0.55, fHz: 3500 },
  ocean:     { hz: 417, wave: 'sine',     noise: 0.38, lfo: 0.06, fHz: 800  },
  escher:    { hz: 963, wave: 'triangle', noise: 0.12, lfo: 0.16, fHz: 2000 },
  chronos:   { hz: 417, wave: 'sine',     noise: 0.08, lfo: 0.11, fHz: 1100 }
};

var _audioCtx = null;
var _masterGain = null;
var _ambientNodes = [];

function _ensureAudio() {
  if (_audioCtx) return;
  _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  _masterGain = _audioCtx.createGain();
  _masterGain.gain.value = 0;
  _masterGain.connect(_audioCtx.destination);
}

function startAmbientAudio(progId) {
  try {
    _ensureAudio();
    stopAmbientAudio();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    var cfg = PROG_AUDIO_CFG[progId] || PROG_AUDIO_CFG.merkaba;
    var ctx = _audioCtx;
    var now = ctx.currentTime;
    var volVal = parseFloat(document.getElementById('vol-slider').value);

    // Sub-bass drone at hz/4 — creates deep resonance
    var subOsc = ctx.createOscillator();
    var subGain = ctx.createGain();
    subOsc.type = 'sine';
    subOsc.frequency.value = cfg.hz / 4;
    subGain.gain.value = 0.18;
    subOsc.connect(subGain);
    subGain.connect(_masterGain);
    subOsc.start();

    // Main harmonic tone through lowpass filter
    var mainOsc = ctx.createOscillator();
    var mainFilt = ctx.createBiquadFilter();
    var mainGain = ctx.createGain();
    mainOsc.type = cfg.wave;
    mainOsc.frequency.value = cfg.hz;
    mainFilt.type = 'lowpass';
    mainFilt.frequency.value = cfg.fHz;
    mainFilt.Q.value = 1.8;
    mainGain.gain.value = 0.07;
    mainOsc.connect(mainFilt);
    mainFilt.connect(mainGain);
    mainGain.connect(_masterGain);
    mainOsc.start();

    // PHI-rate LFO — creates slow breathing pulse
    var lfo = ctx.createOscillator();
    var lfoGain = ctx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = cfg.lfo;
    lfoGain.gain.value = 0.04;
    lfo.connect(lfoGain);
    lfoGain.connect(mainGain.gain);
    lfo.start();

    _ambientNodes.push(subOsc, subGain, mainOsc, mainFilt, mainGain, lfo, lfoGain);

    // Filtered noise layer (adds texture and presence)
    if (cfg.noise > 0) {
      var sRate = ctx.sampleRate;
      var buf = ctx.createBuffer(1, sRate * 3, sRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      var noiseSrc = ctx.createBufferSource();
      noiseSrc.buffer = buf;
      noiseSrc.loop = true;
      var noiseFilt = ctx.createBiquadFilter();
      noiseFilt.type = 'bandpass';
      noiseFilt.frequency.value = cfg.hz * 0.6;
      noiseFilt.Q.value = 0.8;
      var noiseGain = ctx.createGain();
      noiseGain.gain.value = cfg.noise * 0.04;
      noiseSrc.connect(noiseFilt);
      noiseFilt.connect(noiseGain);
      noiseGain.connect(_masterGain);
      noiseSrc.start();
      _ambientNodes.push(noiseSrc, noiseFilt, noiseGain);
    }

    // Fade master in over 2.2 seconds
    _masterGain.gain.setValueAtTime(0, now);
    _masterGain.gain.linearRampToValueAtTime(volVal * 0.22, now + 2.2);

  } catch (e) {
    // AudioContext may be blocked until user gesture — graceful no-op
  }
}

function stopAmbientAudio() {
  var nodes = _ambientNodes.splice(0);
  for (var i = 0; i < nodes.length; i++) {
    try { if (nodes[i].stop) nodes[i].stop(); } catch (e) {}
    try { nodes[i].disconnect(); } catch (e) {}
  }
  if (_masterGain && _audioCtx) {
    try { _masterGain.gain.setValueAtTime(0, _audioCtx.currentTime); } catch (e) {}
  }
}

// Volume slider → wired to master audio gain
document.getElementById('vol-slider').addEventListener('input', function(e) {
  var v = parseFloat(e.target.value);
  if (_masterGain && _audioCtx) {
    _masterGain.gain.setTargetAtTime(v * 0.22, _audioCtx.currentTime, 0.1);
  }
  var btn = document.getElementById('ctrl-vol-btn');
  if (btn) btn.textContent = v === 0 ? '🔇' : v < 0.45 ? '🔉' : '🔊';
});

// Mute button — dispatches input event so audio follows
(function() {
  var volBtn = document.getElementById('ctrl-vol-btn');
  if (volBtn && !volBtn._audioPatched) {
    volBtn._audioPatched = true;
    volBtn.addEventListener('click', function() {
      var slider = document.getElementById('vol-slider');
      if (parseFloat(slider.value) > 0) {
        slider.dataset.prev = slider.value;
        slider.value = 0;
      } else {
        slider.value = slider.dataset.prev || '0.7';
      }
      slider.dispatchEvent(new Event('input'));
    });
  }
})();

  if (!currentProg) return;

  playerElapsed = Math.max(0, Math.min(dur - 0.5, playerElapsed + dir * 10));

function _togglePiP() {
  if (document.pictureInPictureElement) {
    document.exitPictureInPicture().catch(() => {});
    return;
  }
  const canvas = document.getElementById('player-canvas');
  if (!canvas || !canvas.captureStream) { toast('PiP not supported here'); return; }
  const vid = document.getElementById('pip-video');

  vid.srcObject = stream;
  vid.play()
    .then(() => vid.requestPictureInPicture())

}

// ── Up Next ─────────────────────────────────────────────────────────────
let _unTimer = null, _unActive = false, _unNextIdx = -1;
function _showUpNext(nextIdx) {
  if (_unActive || !currentProg) return;
  const scene = currentProg.scenes[nextIdx];
  if (!scene) return;
  _unActive = true; _unNextIdx = nextIdx;
  document.getElementById('un-title').textContent = scene.title;
  document.getElementById('up-next').classList.add('on');
  let t = 10;
  const fill = document.getElementById('un-fill');
  const count = document.getElementById('un-count');
  fill.style.width = '100%';
  count.textContent = t;
  if (_unTimer) clearInterval(_unTimer);
  _unTimer = setInterval(() => {
    t--;
    count.textContent = Math.max(0, t);
    fill.style.width = (t * 10) + '%';
    if (t <= 0) { clearInterval(_unTimer); _unTimer = null; }
  }, 1000);
}
function _dismissUpNext() {
  if (_unTimer) { clearInterval(_unTimer); _unTimer = null; }
  _unActive = false; _unNextIdx = -1;
  document.getElementById('up-next').classList.remove('on');
}
function jumpUpNext() {
  const idx = _unNextIdx;
  _dismissUpNext();
  if (idx >= 0) jumpToScene(idx);
}
function cancelUpNext() {
  _dismissUpNext();
  pausePlayback();
  toast('Auto-advance cancelled');
}

  (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
    .then(() => {
      const t = document.getElementById('share-toast');
      t.classList.add('on');
      setTimeout(() => t.classList.remove('on'), 2400);
    })
    .catch(() => toast('🔗 ' + url));
}
document.getElementById('ctrl-share').addEventListener('click', _sharePlayer);

// ── Reactions ────────────────────────────────────────────────────────────
let _rxnData = {};
try { _rxnData = JSON.parse(localStorage.getItem('aios_reactions') || '{}'); } catch(_) {}
function toggleReaction(btn) {
  const progId = (typeof modalProg !== 'undefined' && modalProg)
    ? modalProg.id : (currentProg ? currentProg.id : null);
  if (!progId) return;
  if (!_rxnData[progId]) _rxnData[progId] = {};
  const rxn = btn.dataset.rxn;
  const wasOn = btn.classList.contains('on');
  btn.classList.toggle('on', !wasOn);
  _rxnData[progId][rxn] = Math.max(0, (_rxnData[progId][rxn] || 0) + (wasOn ? -1 : 1));
  const cEl = btn.querySelector('.rxn-count');
  if (cEl) cEl.textContent = _rxnData[progId][rxn];
  try { localStorage.setItem('aios_reactions', JSON.stringify(_rxnData)); } catch(_) {}
}
function _loadReactions(progId) {
  const d = _rxnData[progId] || {};
  document.querySelectorAll('.rxn-btn').forEach(btn => {
    const rxn = btn.dataset.rxn;
    const n = d[rxn] || 0;
    btn.classList.toggle('on', n > 0);
    const cEl = btn.querySelector('.rxn-count');
    if (cEl) cEl.textContent = n;
  });
}
// Hook into openInfo to load reactions
(function() {
  const _baseOpenInfo = openInfo;
  openInfo = function(progId, e) {
    _baseOpenInfo(progId, e);
    setTimeout(() => _loadReactions(progId), 60);
  };
})();

// ── Card Live-Canvas Preview ─────────────────────────────────────────────
let _previewActive = {};
function _startCardPreview(progId) {
  const canvas = document.getElementById('cv-' + progId);
  if (!canvas || _previewActive[progId]) return;
  // Don't steal from active player or hero renderer
  if (currentProg && currentProg.id === progId) return;
  if (window._activePlayerRenderer === RENDERERS[progId]) return;
  if (heroRenderer === RENDERERS[progId]) return;
  canvas.width  = canvas.offsetWidth  || 220;
  canvas.height = canvas.offsetHeight || 120;
  const renderer = RENDERERS[progId];
  if (!renderer) return;
  _previewActive[progId] = true;
  renderer.start(canvas, 0);
}
function _stopCardPreview(progId) {
  if (!_previewActive[progId]) return;
  _previewActive[progId] = false;
  const renderer = RENDERERS[progId];
  if (renderer) { try { renderer.stop(); } catch(_) {} }
}

// ── Deep-link handler on load ────────────────────────────────────────────
(function _deepLink() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const [progId, sceneStr] = hash.split(':');
  const prog = CATALOGUE.find(p => p.id === progId);
  if (prog) setTimeout(() => openPlayer(progId, parseInt(sceneStr) || 0), 500);
})();
</script>
